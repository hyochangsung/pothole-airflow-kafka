services:
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://${EC2_PUBLIC_IP}:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    networks:
      - pipeline-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pothole-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    networks:
      - pipeline-net

  airflow:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

      # Airflow DAG에서 RDS PostgreSQL 접속할 때 사용
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_NAME: road_events_db
      DB_USER: roaduser
      DB_PASSWORD: ${DB_PASSWORD}

      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_BUCKET: ${S3_BUCKET}

      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}

      # DAG에서 psycopg2 사용하기 위해 설치
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg[binary]==3.2.4 boto3==1.35.99 matplotlib seaborn pandas pyarrow requests"

    command: standalone
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    networks:
      - pipeline-net 

  raw-log-s3-consumer:
    build:
      context: ./consumer_s3
    container_name: raw-log-s3-consumer
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: raw.logs
      KAFKA_GROUP_ID: raw-log-s3-consumer-group

      S3_BUCKET: road-defect-seong
      S3_PREFIX: raw/raw_logs
      FLUSH_INTERVAL_SECONDS: 3600

    networks:
      - pipeline-net
    restart: unless-stopped

  raw-log-rds-consumer:
    build:
      context: ./consumer_rds
    container_name: raw-log-rds-consumer
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: raw.logs
      KAFKA_GROUP_ID: raw-log-rds-consumer-group

      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_NAME: road_events_db
      DB_USER: roaduser
      DB_PASSWORD: ${DB_PASSWORD}

      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
    networks:
      - pipeline-net
    restart: unless-stopped

  consumer:
    build:
      context: ./consumer
    container_name: pothole-consumer
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: pothole-events
      KAFKA_GROUP_ID: pothole-consumer-group
    networks:
      - pipeline-net
    restart: unless-stopped

volumes:
  kafka_data:

networks:
  pipeline-net:
    driver: bridge
